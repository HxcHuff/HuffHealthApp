services:
  postgres-sandbox:
    image: postgres:16
    container_name: huffhealth-postgres-sandbox
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: huffhealthapp_sandbox
    ports:
      - "5434:5432"
    volumes:
      - huffhealth_sandbox_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d huffhealthapp_sandbox"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  huffhealth_sandbox_pgdata:
