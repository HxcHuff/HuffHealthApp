[build]
  command = "npx prisma db push --url \"$NETLIFY_DATABASE_URL_UNPOOLED\" && npx prisma generate && npm run build"
  publish = ".next"
  ignore = "bash ./scripts/netlify-ignore-unapproved.sh"

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_OMIT_PATHS = ".env.example,.env.production.example,.env.staging.example,.env.sandbox.example"

[[plugins]]
  package = "@netlify/plugin-nextjs"
